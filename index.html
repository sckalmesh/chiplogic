<!--
=====================================================
🚀 CHIPLOGIC AUDIT SYSTEM – FRONTEND FEATURES
   Author : Kalmeshwar Chougala
=====================================================

📌 1. Modern Responsive UI
- Clean corporate design
- Mobile-friendly layout
- Adaptive grid (desktop → 2 columns, mobile → 1 column)

📌 2. Dynamic Component Entry
- Add/remove audit rows dynamically
- Each row behaves like a card (mobile-friendly)
- Supports:
  Component, Standard, Installed, Status, Comments, Photo

📌 3. Standards Auto-Fill
- Dropdown-based component selection
- Auto-populates standard specifications
- Supports custom/manual entry

📌 4. Status Management
- Options: Pending / Approved / Rework
- Visual highlighting:
  - Green → Approved
  - Red → Rework
- Card outline + background feedback

📌 5. Image Upload System
- Camera support (mobile capture)
- Image preview before upload
- Upload status indicator:
  - Uploading...
  - Uploaded ✅
  - Failed ❌

📌 6. Image Compression (Performance Optimized)
- Accepts images up to ~10MB
- Compresses before upload:
  - Resize to max width (800px)
  - JPEG conversion
  - Quality reduction (0.6)
- Reduces size drastically (MB → KB)

📌 7. Secure Upload Flow
- Uses Base64 upload
- Sends via fetch() to Apps Script
- Uses AbortController (timeout handling)

📌 8. Submission Workflow
- Uploads all images first
- Then submits full audit data
- Prevents partial submission

📌 9. UX Enhancements
- Loading state:
  "Submitting..." / disabled buttons
- Prevents duplicate clicks
- Real-time status updates
- Error handling UI

📌 10. Table → Card Transformation
- Desktop: Table layout
- Mobile: Card layout (vertical fields)
- Improves usability in field conditions

📌 11. Print Support
- Print-friendly layout
- Hides buttons in print mode

📌 12. Input Validation
- Required fields enforced:
  Vendor, Site, Site Type, Audit Number

=====================================================
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIPLOGIC | Site Engineering & Quality Control</title>
    <style>
        :root {
            --brand-dark: #0f172a;
            --brand-accent: #2563eb;
            --border-light: #e2e8f0;
            --text-muted: #64748b;
            --status-ok: #22c55e;
            --status-error: #ef4444;
            --status-warn: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            padding: 30px;
        }

        .report-container {
            max-width: 1350px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        tr:hover {
            background: #f8fafc;
        }

        /* Corporate Branding Header */
        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 35px 45px;
            color: #ffffff;
            border-bottom: 4px solid var(--brand-accent);
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .header p {
            margin: 5px 0 0;
            opacity: 0.7;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Top Info Grid */
       .metadata-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid var(--border-light);
        }

        @media (max-width: 768px) {
            .metadata-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .action-bar {
            flex-direction: column;
            align-items: stretch;
            }

            .btn-group {
            width: 100%;
            flex-direction: column;
            }

            .btn {
            width: 100%;   /* full width buttons */
            }
        }   
            

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
            background: #ffffff;
            margin-top: 2px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        input:focus {
            outline: none;
            border-color: var(--brand-accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Modern Table Style */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th {
            background: #f1f5f9;
            text-align: left;
            padding: 14px;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Dynamic Status Coloring */
        .row-rework { background-color: #fff1f2; }
        .row-approved { background-color: #f0fdf4; }

        .status-badge {
            font-weight: 700;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .content {
            padding: 30px;
        }

            label {
            letter-spacing: 0.5px;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            border: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-add {
            background: #ffffff;
            color: var(--brand-accent);
            border: 1.5px solid var(--brand-accent);
        }

        .btn-add:hover { background: #eff6ff; }

        .btn-submit {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
        }

        .btn-submit:hover { background: #1d4ed8; }

        .delete-row {
            color: #cbd5e1;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .delete-row:hover { color: var(--status-error); }

        /* 🔥 MAKE COMPONENT ROWS VERTICAL */
        #auditTable tbody tr {
            display: block;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            background: #ffffff;
        }

        /* Each cell becomes vertical block */
        #auditTable tbody td {
            display: block;
            width: 100%;
            margin-bottom: 18px;
            padding: 0;
        }

        #auditTable thead {
            display: none;
        }

        #auditTable tbody tr:hover {
            transform: translateY(-2px);
            transition: 0.2s;
        }

        /* Labels before each field */
        #auditTable tbody td:nth-child(2)::before { content: "Component Category"; }
        #auditTable tbody td:nth-child(3)::before { content: "Standard Spec"; }
        #auditTable tbody td:nth-child(4)::before { content: "Installed Spec"; }
        #auditTable tbody td:nth-child(5)::before { content: "Engineer Comments"; }
        #auditTable tbody td:nth-child(6)::before { content: "Photo"; }
        #auditTable tbody td:nth-child(7)::before { content: "Status"; }

        /* Label styling */
        #auditTable tbody td::before {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
        }

        @media print {
            .btn, .delete-row { display: none !important; }
            body { padding: 0; }
            .report-container { box-shadow: none; border: 1px solid #000; }
        }
        /* 📱 Mobile Responsive */
            

        input, select, textarea {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;   /* 🔥 IMPORTANT */             
        }
           
        /* Card Layout */
        .row-card {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            position: relative;
            transition: all 0.2s ease;

        }

        /* Field Block */
        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .row-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        /* Labels */
        .field label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
        }

        /* Inputs */
        .field input,
        .field select,
        .field textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        /* Status Highlight */
        .status-field select {
            font-weight: 600;
        }

        /* Delete button */
        .delete-row {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f1f5f9;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            z-index: 2;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;   /* 🔥 prevents overflow */
        }

    </style>
</head>
<body>

<div class="report-container">
    <div class="header">
        <h1>CHIPLOGIC</h1>
        <p>Advanced Solar Solutions • Technical Site Audit</p>
    </div>

    <div class="content">
        <div class="metadata-grid">

        <div class="input-group">
            <label>Site Type</label>
            <select id="siteType">
                <option value="">Select Site Type</option>
                <option value="On Grid">On Grid</option>
                <option value="Off Grid">Off Grid</option>
                <option value="Hybrid">Hybrid</option>
            </select>
        </div>

        <div class="input-group">
            <label>Assigned Vendor</label>
            <input type="text" id="vendor" placeholder="Enter Vendor Name">
        </div>

        <div class="input-group">
            <label>Site ID / Project Name</label>
            <input type="text" id="site" placeholder="Enter Site Detail">
        </div>

        <div class="input-group">
            <label>Inspection Date</label>
            <input type="date" id="date">
        </div>

        <div class="input-group">
            <label>Auditor Name</label>
            <input type="text" id="auditor" placeholder="Enter Auditor Name">
        </div>

        <div class="input-group">
            <label>Audit Number</label>
            <input type="text" id="auditNumber" placeholder="Enter Audit Number">
        </div>

        </div>
        <div class="table-wrapper">
            <table id="auditTable">
                <thead>
                    <tr>
                        <th width="50">#</th>
                        <th>Component Category</th>
                        <th width="200">Standard Spec</th>
                        <th width="200">Installed Spec</th>
                        <th width="150">Status</th>
                        <th>Engineer Comments</th>
                        <th>Photo</th>
                        <th width="50"></th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>

        <div class="action-bar">    
            <button class="btn btn-add" onclick="addRow()">+ Add New Component</button>
            <div class="btn-group">
                <button class="btn" style="background: #64748b; color: white;" onclick="window.print()">Print PDF</button>
                <button class="btn btn-submit" id="submitBtn" onclick="submitData()">Finalize Audit</button>
            </div>
        </div>
        <div id="statusMessage" style="
            margin-top:15px;
            font-weight:600;
            text-align:center;
            display:none;
        "></div>
    </div>
</div>

<script>
/** * EDITABLE STANDARDS REGISTRY
 * You can add or modify components and their official standards here.
 */
const standardsRegistry = {
    "Solar Panel 1": "550W Mono PERC",
    "Solar Panel 2": "600W Bifacial",
    "Inverter 1": "50kW String Inverter",
    "Inverter 2": "100kW Central Inverter",
    "DC Cable": "4sqmm Copper UV Protected",
    "Earthing Kit": "Chemical Earthing 80mm",
    "Structure": "HDG 80 Microns Coating"
};

let rowCount = 0;

function addRow() {
    rowCount++;
    const tbody = document.querySelector("#auditTable tbody");
    const row = tbody.insertRow();
    row.classList.add("row-card");

    row.innerHTML = `
        <td style="color: #94a3b8; font-weight: 600;">${rowCount}</td>
        <td>
            <select class="comp-select" onchange="applyStandard(this)">
                <option value="">-- Select Component --</option>
                ${Object.keys(standardsRegistry).map(key => `<option value="${key}">${key}</option>`).join('')}
                <option value="custom">Other / Custom</option>
            </select>
        </td>
        <td><input type="text" class="std-input" readonly placeholder="--" tabindex="-1" style="background:#f8fafc;"></td>
        <td><input type="text"  class="installed-input" placeholder="Value Found"></td>

        <td><textarea  class="comment-input" placeholder="Technical notes..." rows="1"></textarea></td>
        <td>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <input type="file" accept="image/*" capture="environment" class="photo-input" onchange="previewImage(this)">
                <img style="width:60px; height:60px; object-fit:cover; border-radius:6px; display:none;" />
                <span class="upload-status" style="font-size:11px; color:#64748b;"></span>
            </div>
        </td>
                <td>
            <select class="status-select status-badge" onchange="colorRow(this)">
                <option value="Pending">🕒 Pending</option>
                <option value="Approved">✅ Approved</option>
                <option value="Rework">❌ Rework</option>
            </select>
        </td>
        <td><button class="delete-row" onclick="removeRow(this)">×</button></td>
    `;
}

// Map the selection to the standard in the registry
function applyStandard(select) {
    const row = select.closest('tr');
    const stdInput = row.querySelector('.std-input');
    const selectedValue = select.value;

    if (selectedValue === 'custom') {
        stdInput.readOnly = false;
        stdInput.style.background = "#fff";
        stdInput.value = "";
        stdInput.placeholder = "Enter Manual Standard";
    } else if (standardsRegistry[selectedValue]) {
        stdInput.readOnly = true;
        stdInput.style.background = "#f8fafc";
        stdInput.value = standardsRegistry[selectedValue];
    } else {
        stdInput.value = "";
    }
}

// Change row color based on status
function colorRow(select) {
    const card = select.closest('.row-card');
    if (!card) return;

    // Reset
    card.style.outline = "none";

    if (select.value === "Approved") {
        card.style.outline = "3px solid #22c55e"; // green
    } else if (select.value === "Rework") {
        card.style.outline = "3px solid #ef4444"; // red
    }
    if (select.value === "Approved") {
    card.style.background = "#f0fdf4";
}
}


function removeRow(btn) {
    btn.closest('tr').remove();
}


async function uploadFile(file, vendor, site, siteType, auditNumber) {

    // 🔒 Allow up to 10MB
    if (file.size > 10 * 1024 * 1024) {
        throw new Error("File exceeds 10MB limit");
    }

    // ✅ COMPRESS IMAGE
    const base64 = await compressImage(file);

    console.log("Compressed size:", base64.length / 1024, "KB");

    const payload = {
        file: base64,
        fileName: file.name,
        mimeType: "image/jpeg", // 🔥 IMPORTANT
        vendor,
        site,
        siteType,
        auditNumber
    };

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycby86KSOJbNRGQUjgKjYczfq_b6wgbdQz2kgRhOEUprvivg6fMSsKRPXVZ1OwYlL4ODa/exec", {
            method: "POST",
            body: JSON.stringify(payload),
            headers: {
                "Content-Type": "text/plain"
            },
            signal: controller.signal
        });

        clearTimeout(timeout);

        const text = await res.text();
        console.log("Uploaded file URL:", text);

        if (text.includes("Error")) {
            throw new Error(text);
        }

        return text;

    } catch (err) {
        console.error("Upload error:", err);
        throw err;
    }
}

async function compressImage(file) {
    return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = function (e) {
            img.src = e.target.result;
        };

        img.onload = function () {
            const canvas = document.createElement("canvas");

            const MAX_WIDTH = 800;
            const scale = Math.min(MAX_WIDTH / img.width, 1); // 🔥 prevent upscaling

            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const compressedBase64 = canvas.toDataURL("image/jpeg", 0.6);

            resolve(compressedBase64.split(",")[1]);
        };

        reader.readAsDataURL(file);
    });
}

function previewImage(input) {
    const file = input.files[0];
    const img = input.nextElementSibling;

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            img.src = e.target.result;
            img.style.display = "block";
        };
        reader.readAsDataURL(file);
    }
}

async function submitData() {
    const vendor = document.getElementById('vendor').value.trim();
    const site = document.getElementById('site').value.trim();
    const date = document.getElementById('date').value.trim();
    const siteType = document.getElementById('siteType').value.trim();
    const auditor = document.getElementById('auditor').value.trim();
    const auditNumber = document.getElementById('auditNumber').value.trim();
    const statusDiv = document.getElementById("statusMessage");
    const submitBtn = document.getElementById("submitBtn");
    
    if (!vendor || !site || !siteType || !auditNumber) {
    alert("Please fill all required fields");
    return;
    }

    // 🔵 SHOW "SUBMITTING"
    statusDiv.style.display = "block";
    statusDiv.style.color = "#2563eb";
    statusDiv.innerText = "⏳ Submitting your audit... please wait";

    submitBtn.disabled = true;
    submitBtn.innerText = "Submitting...";
    const addBtn = document.querySelector(".btn-add");
      if (addBtn) addBtn.disabled = true;

    const rows = document.querySelectorAll("#auditTable tbody tr");

    let components = [];

    for (let row of rows) {
    const fileInput = row.querySelector(".photo-input");
    const statusSpan = row.querySelector(".upload-status");

let fileUrl = "";

if (fileInput && fileInput.files.length > 0) {

    // 🔵 SHOW UPLOADING
    if (statusSpan) statusSpan.innerText = "Uploading...";

    try {
        fileUrl = await uploadFile(
            fileInput.files[0],
            vendor,
            site,
            siteType,
            auditNumber
        );

        // 🟢 SUCCESS
        if (statusSpan) statusSpan.innerText = "Uploaded ✅";

    } catch (err) {
        console.error("Upload failed:", err);
        fileUrl = "UPLOAD_FAILED";

        // 🔴 ERROR
        if (statusSpan) statusSpan.innerText = "Failed ❌";
    }
}

        components.push({
            component: row.querySelector(".comp-select").value,
            standard: row.querySelector(".std-input").value,
            installed: row.querySelector(".installed-input").value,
            status: row.querySelector(".status-select").value,
            comments: row.querySelector(".comment-input").value,
            file: fileUrl
        });
}

    const payload = {
            vendor,
            site,
            siteType,
            date,
            auditor,
            auditNumber,
            components
    };

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycby86KSOJbNRGQUjgKjYczfq_b6wgbdQz2kgRhOEUprvivg6fMSsKRPXVZ1OwYlL4ODa/exec", {
        method: "POST",
        body: JSON.stringify(payload),
        headers: {
            "Content-Type": "text/plain"
        }
        });

        const result = await res.text();
        console.log("Final submission response:", result);

        if (result.includes("Error")) {
            throw new Error(result);
        }

        // ✅ SUCCESS
        statusDiv.style.color = "#22c55e";
        statusDiv.innerText = "✅ Audit submitted successfully!";
    }
    
    catch (err) {
    console.error("Submit failed:", err);

    // ❌ ERROR UI
    statusDiv.style.color = "#ef4444";
    statusDiv.innerText = "❌ Submission failed. Check console.";
    }


    submitBtn.disabled = false;
    submitBtn.innerText = "Finalize Audit";
    document.querySelector(".btn-add").disabled = false;

    }
    

// Initial Rows
window.onload = () => {
    addRow();
    addRow();
};
</script>

</body>
</html>
